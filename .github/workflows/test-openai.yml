name: Test Suite - OpenAI

permissions:
    contents: read

on:
  push:
    paths:
      - "libs/providers/openai/**"
      - "libs/core/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: serapeum-org/github-actions/actions/python-setup/uv@uv/v1
        with:
          python-version: ${{ matrix.python-version }}
          install-groups: "groups: dev"
          verify-lock: true

      - name: Test OpenAI Package
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv run pytest -c libs/providers/openai/pyproject.toml libs/providers/openai/tests/ -sv -m "not e2e" --cov=libs/providers/openai/src --cov-report=xml --cov-append

      - name: Upload coverage reports to Codecov with GitHub Action
        uses: codecov/codecov-action@v3

  e2e:
    # Run on a single OS/Python to keep CI fast — the e2e job validates the
    # full inference pipeline, not cross-platform compatibility.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: serapeum-org/github-actions/actions/python-setup/uv@uv/v1
        with:
          python-version: "3.12"
          install-groups: "groups: dev"
          verify-lock: true

      - name: Run OpenAI e2e tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          uv run pytest -c libs/providers/openai/pyproject.toml libs/providers/openai/tests/ -sv -m "e2e and not function_calling" \
            --cov=libs/providers/openai/src \
            --cov-report=xml --cov-append

      - name: Upload coverage reports to Codecov with GitHub Action
        uses: codecov/codecov-action@v3

  markdown-docstring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: serapeum-org/github-actions/actions/python-setup/uv@uv/v1
        with:
          python-version: "3.12"
          install-groups: "groups: dev"
          verify-lock: true

      - name: Test openai doctests
        run: |
          uv run pytest --doctest-modules libs/providers/openai/src/ -v

      - name: Test markdown docs openai
        run: |
          uv run pytest -v --markdown-docs docs/reference/providers/openai/
          uv run pytest -v --markdown-docs libs/providers/openai/README.md
